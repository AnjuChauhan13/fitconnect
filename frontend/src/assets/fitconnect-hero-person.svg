<svg width="420" height="480" viewBox="0 0 420 480" xmlns="http://www.w3.org/2000/svg">

  <!-- background decorative shapes -->
  <circle cx="60" cy="60" r="22" fill="#FDE9DC"/>
  <circle cx="370" cy="420" r="30" fill="#DCF3EE"/>
  <rect x="330" y="40" width="26" height="26" rx="6" fill="#FDE9DC" transform="rotate(20 343 53)"/>

  <!-- main post card -->
  <rect x="70" y="70" width="260" height="340" rx="24" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="2"/>

  <!-- card header: avatar + name lines -->
  <circle cx="104" cy="104" r="18" fill="#F97316"/>
  <text x="104" y="110" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" fill="#FFFFFF" text-anchor="middle">A</text>
  <rect x="132" y="96" width="90" height="8" rx="4" fill="#1F2937"/>
  <rect x="132" y="110" width="60" height="6" rx="3" fill="#D1D5DB"/>

  <!-- photo area -->
  <rect x="86" y="132" width="228" height="180" rx="14" fill="#14B8A6"/>
  <circle cx="130" cy="160" r="9" fill="#DCF3EE"/>
  <circle cx="280" cy="150" r="6" fill="#DCF3EE"/>
  <path d="M86 300 q114 -40 228 0 v12 h-228z" fill="#0F9488"/>

  <!-- person: mid-lunge / stretch pose -->
  <g transform="translate(200 230)">
    <!-- back leg -->
    <rect x="-6" y="18" width="14" height="52" rx="7" fill="#1F2937" transform="rotate(24 0 18)"/>
    <!-- front leg -->
    <rect x="-6" y="18" width="14" height="52" rx="7" fill="#111827" transform="rotate(-18 0 18)"/>
    <!-- shoes -->
    <ellipse cx="34" cy="66" rx="12" ry="7" fill="#F97316" transform="rotate(24 34 66)"/>
    <ellipse cx="-30" cy="66" rx="12" ry="7" fill="#F97316" transform="rotate(-18 -30 66)"/>
    <!-- torso -->
    <rect x="-16" y="-30" width="32" height="52" rx="14" fill="#F97316"/>
    <!-- back arm -->
    <rect x="-4" y="-24" width="12" height="40" rx="6" fill="#EA6A0C" transform="rotate(140 0 -24)"/>
    <!-- front arm raised -->
    <rect x="-4" y="-24" width="12" height="42" rx="6" fill="#FB923C" transform="rotate(-40 0 -24)"/>
    <!-- neck -->
    <rect x="-6" y="-38" width="12" height="12" fill="#E8A874"/>
    <!-- head -->
    <circle cx="0" cy="-52" r="16" fill="#F2B078"/>
    <!-- hair -->
    <path d="M-16 -56 a16 16 0 0 1 32 0 q-2 -10 -16 -10 t-16 10z" fill="#3F2A1D"/>
    <!-- headband -->
    <rect x="-16" y="-58" width="32" height="6" rx="3" fill="#14B8A6"/>
  </g>

  <!-- action row: like / comment icons -->
  <path d="M96 336 c0 -8 8 -12 12 -6 4 -6 12 -2 12 6 c0 8 -12 16 -12 16 s-12 -8 -12 -16z" fill="#F97316"/>
  <path d="M138 328 h24 a6 6 0 0 1 6 6 v6 a6 6 0 0 1 -6 6 h-14 l-6 6 v-6 h-4 a6 6 0 0 1 -6 -6 v-6 a6 6 0 0 1 6 -6z" fill="none" stroke="#1F2937" stroke-width="3"/>

  <!-- caption lines -->
  <rect x="86" y="358" width="180" height="8" rx="4" fill="#1F2937"/>
  <rect x="86" y="374" width="120" height="8" rx="4" fill="#D1D5DB"/>

  <!-- floating like bubble -->
  <circle cx="60" cy="230" r="36" fill="#F97316"/>
  <path d="M46 226 c0 -10 10 -15 15 -7 5 -8 15 -3 15 7 c0 10 -15 20 -15 20 s-15 -10 -15 -20z" fill="#FFFFFF"/>
  <rect x="30" y="256" width="60" height="20" rx="10" fill="#FFFFFF"/>
  <text x="60" y="270" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="700" fill="#F97316" text-anchor="middle">248 likes</text>

  <!-- floating comment bubble -->
  <circle cx="360" cy="150" r="40" fill="#1F2937"/>
  <path d="M340 138 h40 a8 8 0 0 1 8 8 v10 a8 8 0 0 1 -8 8 h-22 l-10 10 v-10 h-8 a8 8 0 0 1 -8 -8 v-10 a8 8 0 0 1 8 -8z" fill="#FFFFFF"/>
  <rect x="332" y="182" width="56" height="20" rx="10" fill="#FFFFFF"/>
  <text x="360" y="196" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="700" fill="#1F2937" text-anchor="middle">32 comments</text>

  <!-- floating profile bubble: small person avatar with check badge -->
  <circle cx="352" cy="330" r="34" fill="#14B8A6"/>
  <circle cx="352" cy="322" r="10" fill="#FFFFFF"/>
  <path d="M334 344 a18 16 0 0 1 36 0z" fill="#FFFFFF"/>
  <circle cx="374" cy="308" r="9" fill="#F97316"/>
  <path d="M370 308 l3 3 l5 -6" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

</svg>
